<svg xmlns="http://www.w3.org/2000/svg" width="360" height="420" viewBox="0 0 360 420" font-family="Georgia, 'Times New Roman', serif">
  <rect width="360" height="420" fill="white"/>

  <!-- ===== Potential divider (same topology as Zdiv.png) ===== -->
  <!-- wires: left rail, top rail, right rail, bottom rail -->
  <g stroke="black" stroke-width="2" fill="none">
    <!-- top rail -->
    <line x1="70" y1="60" x2="250" y2="60"/>
    <!-- left rail down to source -->
    <line x1="70" y1="60" x2="70" y2="150"/>
    <!-- left rail below source to bottom -->
    <line x1="70" y1="210" x2="70" y2="360"/>
    <!-- bottom rail -->
    <line x1="70" y1="360" x2="250" y2="360"/>
    <!-- right rail top to R -->
    <line x1="250" y1="60" x2="250" y2="90"/>
    <!-- between R and Z (middle node) -->
    <line x1="250" y1="160" x2="250" y2="230"/>
    <!-- Z to bottom -->
    <line x1="250" y1="300" x2="250" y2="360"/>
  </g>

  <!-- source symbol -->
  <circle cx="70" cy="180" r="30" stroke="black" stroke-width="2" fill="white"/>
  <path d="M55 180 q7 -14 15 0 q8 14 15 0" stroke="black" stroke-width="2" fill="none"/>
  <text x="20" y="185" font-size="17" font-style="italic">v<tspan font-size="11" dy="4">in</tspan></text>

  <!-- R (top component) -->
  <rect x="235" y="90" width="30" height="70" stroke="black" stroke-width="2" fill="white"/>
  <text x="278" y="130" font-size="18" font-style="italic">R</text>
  <text x="196" y="130" font-size="16" font-style="italic">v<tspan font-size="11" dy="4">R</tspan></text>

  <!-- Z (bottom component, black box) -->
  <rect x="235" y="230" width="30" height="70" stroke="black" stroke-width="2" fill="white"/>
  <text x="278" y="270" font-size="18" font-style="italic">Z</text>
  <text x="196" y="270" font-size="16" font-style="italic">v<tspan font-size="11" dy="4">Z</tspan></text>

  <!-- ground symbol -->
  <g stroke="black" stroke-width="2">
    <line x1="70" y1="360" x2="70" y2="385"/>
    <line x1="55" y1="385" x2="85" y2="385"/>
    <line x1="60" y1="392" x2="80" y2="392"/>
    <line x1="65" y1="399" x2="75" y2="399"/>
  </g>

  <!-- node dots -->
  <g fill="black">
    <circle cx="250" cy="60" r="3"/>
    <circle cx="250" cy="195" r="3"/>
    <circle cx="250" cy="360" r="3"/>
  </g>

  <!-- ===== Oscilloscope probes ===== -->
  <!-- CH1 (blue): + at top node, gnd at common ground -->
  <g stroke="#1560d4" stroke-width="2" fill="none">
    <line x1="250" y1="60" x2="315" y2="35"/>       <!-- + lead to top node -->
    <line x1="250" y1="360" x2="330" y2="360"/>     <!-- gnd lead to common ground -->
  </g>
  <circle cx="315" cy="35" r="9" fill="white" stroke="#1560d4" stroke-width="2"/>
  <text x="311" y="40" font-size="13" fill="#1560d4" font-weight="bold">+</text>
  <circle cx="330" cy="360" r="9" fill="white" stroke="#1560d4" stroke-width="2"/>
  <text x="325.5" y="365" font-size="14" fill="#1560d4" font-weight="bold">&#8722;</text>
  <text x="300" y="22" font-size="12" fill="#1560d4" font-weight="bold">CH1</text>

  <!-- CH2 (orange): + at middle node, gnd at common ground -->
  <g stroke="#e07b00" stroke-width="2" fill="none">
    <line x1="250" y1="195" x2="315" y2="195"/>     <!-- + lead to middle node -->
    <line x1="250" y1="360" x2="330" y2="385"/>     <!-- gnd lead to common ground -->
  </g>
  <circle cx="315" cy="195" r="9" fill="white" stroke="#e07b00" stroke-width="2"/>
  <text x="311" y="200" font-size="13" fill="#e07b00" font-weight="bold">+</text>
  <circle cx="330" cy="385" r="9" fill="white" stroke="#e07b00" stroke-width="2"/>
  <text x="325.5" y="390" font-size="14" fill="#e07b00" font-weight="bold">&#8722;</text>
  <text x="300" y="182" font-size="12" fill="#e07b00" font-weight="bold">CH2</text>

  <!-- green tick -->
  <g stroke="#1a9d2d" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M110 90 l18 20 l34 -44"/>
  </g>
</svg>
