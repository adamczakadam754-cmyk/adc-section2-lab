<svg xmlns="http://www.w3.org/2000/svg" width="380" height="420" viewBox="0 0 380 420" font-family="Georgia, 'Times New Roman', serif">
  <rect width="380" height="420" fill="white"/>

  <!-- title -->
  <text x="190" y="26" font-size="15" text-anchor="middle" font-style="italic">RC low-pass filter (output across C), f<tspan font-size="11" dy="4">c</tspan><tspan dy="-4"> &#8776; 159 Hz</tspan></text>

  <!-- wires -->
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="70" y1="70" x2="250" y2="70"/>            <!-- top rail -->
    <line x1="70" y1="70" x2="70" y2="160"/>            <!-- left rail upper -->
    <line x1="70" y1="220" x2="70" y2="370"/>           <!-- left rail lower -->
    <line x1="70" y1="370" x2="250" y2="370"/>          <!-- bottom rail -->
    <line x1="250" y1="70" x2="250" y2="100"/>          <!-- to R -->
    <line x1="250" y1="170" x2="250" y2="205"/>         <!-- R to mid node -->
    <line x1="250" y1="205" x2="250" y2="250"/>         <!-- mid node to C top plate -->
    <line x1="250" y1="262" x2="250" y2="370"/>         <!-- C bottom plate to bottom rail -->
    <line x1="250" y1="205" x2="315" y2="205"/>         <!-- Vout lead -->
  </g>

  <!-- source -->
  <circle cx="70" cy="190" r="30" stroke="black" stroke-width="2" fill="white"/>
  <path d="M55 190 q7 -14 15 0 q8 14 15 0" stroke="black" stroke-width="2" fill="none"/>
  <text x="16" y="195" font-size="16" font-style="italic">v<tspan font-size="11" dy="4">in</tspan></text>

  <!-- R (top, series) -->
  <rect x="235" y="100" width="30" height="70" stroke="black" stroke-width="2" fill="white"/>
  <text x="278" y="130" font-size="17" font-style="italic">R</text>
  <text x="278" y="150" font-size="13">1&#8202;k&#937;</text>

  <!-- C (bottom, shunt) -->
  <g stroke="black" stroke-width="2">
    <line x1="228" y1="250" x2="272" y2="250"/>         <!-- top plate -->
    <line x1="228" y1="262" x2="272" y2="262"/>         <!-- bottom plate -->
  </g>
  <text x="285" y="256" font-size="17" font-style="italic">C</text>
  <text x="285" y="276" font-size="13">1&#8202;&#956;F</text>

  <!-- Vout node + label -->
  <circle cx="250" cy="205" r="3" fill="black"/>
  <rect x="313" y="200" width="9" height="9" fill="#1560d4"/>
  <text x="328" y="209" font-size="15" font-style="italic">v<tspan font-size="11" dy="4">out</tspan></text>

  <!-- ground -->
  <g stroke="black" stroke-width="2">
    <line x1="70" y1="370" x2="70" y2="392"/>
    <line x1="55" y1="392" x2="85" y2="392"/>
    <line x1="60" y1="399" x2="80" y2="399"/>
    <line x1="65" y1="406" x2="75" y2="406"/>
  </g>
</svg>
