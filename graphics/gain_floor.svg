<svg xmlns="http://www.w3.org/2000/svg" width="460" height="430" viewBox="0 0 460 430" font-family="Georgia, 'Times New Roman', serif">
  <rect width="460" height="430" fill="white"/>

  <!-- wires -->
  <g stroke="black" stroke-width="2" fill="none">
    <!-- top rail (Vout) -->
    <line x1="110" y1="80" x2="330" y2="80"/>
    <!-- Vout lead up -->
    <line x1="110" y1="80" x2="110" y2="52"/>
    <!-- left branch: Vout -> R1 -> Vi -->
    <line x1="110" y1="80" x2="110" y2="110"/>
    <line x1="110" y1="180" x2="110" y2="215"/>
    <!-- Vi node to source -->
    <line x1="110" y1="215" x2="60" y2="215"/>
    <line x1="60" y1="215" x2="60" y2="225"/>
    <line x1="60" y1="285" x2="60" y2="380"/>
    <!-- bottom rail -->
    <line x1="60" y1="380" x2="330" y2="380"/>
    <!-- right branch: Vout -> R2 -> node N -->
    <line x1="330" y1="80" x2="330" y2="110"/>
    <line x1="330" y1="180" x2="330" y2="205"/>
    <!-- node N split to C1 and R3 -->
    <line x1="295" y1="205" x2="365" y2="205"/>
    <!-- C1 branch -->
    <line x1="295" y1="205" x2="295" y2="248"/>
    <line x1="295" y1="260" x2="295" y2="330"/>
    <!-- R3 branch -->
    <line x1="365" y1="205" x2="365" y2="235"/>
    <line x1="365" y1="305" x2="365" y2="330"/>
    <!-- join back to bottom rail -->
    <line x1="295" y1="330" x2="365" y2="330"/>
    <line x1="330" y1="330" x2="330" y2="380"/>
  </g>

  <!-- source -->
  <circle cx="60" cy="255" r="30" stroke="black" stroke-width="2" fill="white"/>
  <path d="M45 255 q7 -14 15 0 q8 14 15 0" stroke="black" stroke-width="2" fill="none"/>
  <text x="60" y="312" font-size="15" font-style="italic" text-anchor="middle">v<tspan font-size="11" dy="4">in</tspan></text>

  <!-- R1 (upper-left, series) -->
  <rect x="95" y="110" width="30" height="70" stroke="black" stroke-width="2" fill="white"/>
  <text x="66" y="140" font-size="16" font-style="italic">R<tspan font-size="11" dy="4">1</tspan></text>
  <text x="60" y="162" font-size="13">1&#8202;k&#937;</text>

  <!-- R2 (upper-right, series) -->
  <rect x="315" y="110" width="30" height="70" stroke="black" stroke-width="2" fill="white"/>
  <text x="356" y="140" font-size="16" font-style="italic">R<tspan font-size="11" dy="4">2</tspan></text>
  <text x="356" y="162" font-size="13">1&#8202;k&#937;</text>

  <!-- C1 (shunt, left of lower pair) -->
  <g stroke="black" stroke-width="2">
    <line x1="273" y1="248" x2="317" y2="248"/>
    <line x1="273" y1="260" x2="317" y2="260"/>
  </g>
  <text x="242" y="254" font-size="16" font-style="italic">C<tspan font-size="11" dy="4">1</tspan></text>
  <text x="236" y="276" font-size="13">1&#8202;&#956;F</text>

  <!-- R3 (shunt, right of lower pair) -->
  <rect x="350" y="235" width="30" height="70" stroke="black" stroke-width="2" fill="white"/>
  <text x="388" y="265" font-size="16" font-style="italic">R<tspan font-size="11" dy="4">3</tspan></text>
  <text x="388" y="287" font-size="13">2&#8202;k&#937;</text>

  <!-- nodes -->
  <g fill="black">
    <circle cx="110" cy="80" r="3"/>
    <circle cx="110" cy="215" r="3"/>
    <circle cx="330" cy="80" r="3"/>
    <circle cx="330" cy="205" r="3"/>
    <circle cx="330" cy="330" r="3"/>
  </g>

  <!-- Vout label + probe -->
  <rect x="105.5" y="40" width="9" height="9" fill="#1560d4"/>
  <text x="122" y="49" font-size="15" font-style="italic">v<tspan font-size="11" dy="4">out</tspan></text>

  <!-- Vi label -->
  <text x="118" y="210" font-size="13" font-style="italic">V<tspan font-size="10" dy="3">i</tspan></text>

  <!-- ground -->
  <g stroke="black" stroke-width="2">
    <line x1="195" y1="380" x2="195" y2="400"/>
    <line x1="180" y1="400" x2="210" y2="400"/>
    <line x1="185" y1="407" x2="205" y2="407"/>
    <line x1="190" y1="414" x2="200" y2="414"/>
  </g>
</svg>
